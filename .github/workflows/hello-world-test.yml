name: Hello World Test 🧪

on:
  push:
    branches: [ main ]

jobs:
  hello-world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create output folder
        run: mkdir -p output logs

      - name: Run Hello World Test
        run: |
          echo "========================================" | tee -a output/output.txt
          echo "  Hello World! 🌍 Test Run" | tee -a output/output.txt
          echo "  Time: $(date)" | tee -a output/output.txt
          echo "  Runner: $RUNNER_NAME" | tee -a output/output.txt
          echo "  Job: $GITHUB_JOB" | tee -a output/output.txt
          echo "  Workflow: $GITHUB_WORKFLOW" | tee -a output/output.txt
          echo "  Run ID: $GITHUB_RUN_ID" | tee -a output/output.txt
          echo "========================================" | tee -a output/output.txt
          echo "" | tee -a output/output.txt
          echo "✅ Test PASSED - Hello World successful!" | tee -a output/output.txt

      - name: Write artifact URL to output
        run: |
          echo "" | tee -a output/output.txt
          echo "----------------------------------------" | tee -a output/output.txt
          echo "📦 Artifact URL (after workflow completes):" | tee -a output/output.txt
          echo "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" | tee -a output/output.txt
          echo "----------------------------------------" | tee -a output/output.txt

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-output
          path: output/output.txt

      - name: Hit Monitor API 🔍
        run: |
          echo "📡 Monitor API ko request maar rahe hain..." | tee -a output/output.txt
          RESPONSE=$(curl -s https://track-workflow.onrender.com/full)
          echo "$RESPONSE" | tee -a output/output.txt
          echo "✅ Monitor API hit complete!" | tee -a output/output.txt

      - name: Commit output to repo
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/output.txt
          git diff --staged --quiet || git commit -m "🤖 Auto: Hello World test output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
