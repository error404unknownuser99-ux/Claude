name: GitHub Runner System Specs

on:
  push:
    branches: [ main ]

jobs:
  check-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check System Specs and Save Output
        run: |
          mkdir -p output
          {
            echo "======================================"
            echo "  GitHub Actions Runner System Specs"
            echo "  Started at: $(date)"
            echo "======================================"
            echo ""

            echo "--- CPU INFO ---"
            echo "CPU Model:"
            cat /proc/cpuinfo | grep "model name" | head -1
            echo "CPU Cores (logical):"
            nproc
            echo "CPU Cores (physical):"
            grep "cpu cores" /proc/cpuinfo | head -1
            echo "CPU Speed:"
            cat /proc/cpuinfo | grep "cpu MHz" | head -1
            echo ""

            echo "--- RAM INFO ---"
            free -h
            echo ""
            echo "Total RAM:"
            grep MemTotal /proc/meminfo
            echo "Available RAM:"
            grep MemAvailable /proc/meminfo
            echo ""

            echo "--- STORAGE INFO ---"
            df -h
            echo ""
            echo "Total Disk:"
            df -h --total | tail -1
            echo ""

            echo "--- GPU INFO ---"
            echo "Checking for GPU..."
            if command -v nvidia-smi &> /dev/null; then
              nvidia-smi
            else
              echo "No NVIDIA GPU found (standard GitHub runner has no GPU)"
            fi
            lspci 2>/dev/null | grep -i vga || echo "No VGA device found via lspci"
            echo ""

            echo "--- OS INFO ---"
            uname -a
            cat /etc/os-release | head -5
            echo ""

            echo "--- SWAP INFO ---"
            swapon --show || echo "No swap active"
            echo ""

            echo "======================================"
            echo "  Scan Complete at: $(date)"
            echo "======================================"
          } | tee output/output.txt

      - name: Commit Output
        run: |
          git config user.email "claude@anthropic.com"
          git config user.name "Claude Bot"
          git add output/output.txt
          git commit -m "Runner specs output - $(date)" || echo "Nothing to commit"
          git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git
