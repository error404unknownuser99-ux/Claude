name: VNC Desktop Session (bore.pub)

on:
  push:
    paths:
      - '.github/workflows/vnc-desktop.yml'

jobs:
  vnc-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git Config
        run: |
          git config user.email "claude@anthropic.com"
          git config user.name "Claude Bot"

      - name: Init Status
        run: |
          mkdir -p output
          cat > output/output.txt << EOF
вЏі WORKFLOW STARTED at $(date)
Step: Installing packages... IN PROGRESS рџ”„
EOF
          git add output/output.txt
          git commit -m "вЏі VNC started - $(date +%s)"
          git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git

      - name: Install Desktop + VNC
        run: |
          set -e

          push_status() {
            mkdir -p output
            printf '%s\n' "$1" > output/output.txt
            git add output/output.txt
            git commit -m "status $(date +%s)" || true
            git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git || true
          }

          sudo apt-get update -qq || {
            push_status "вќЊ CRASH: apt-get update FAILED at $(date)"
            exit 1
          }

          push_status "вЏі Installing XFCE4 + VNC + Themes... $(date) (2-3 min lagega)"

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xfce4-terminal xfce4-whiskermenu-plugin \
            tigervnc-standalone-server tigervnc-common \
            arc-theme papirus-icon-theme \
            dbus-x11 x11-utils x11-apps \
            gedit thunar mousepad chromium-browser \
            fonts-noto fonts-noto-color-emoji \
            --no-install-recommends || {
            push_status "вќЊ CRASH: apt install FAILED at $(date)"
            exit 1
          }

          push_status "вњ… Packages installed! Setting up VNC... $(date)"

      - name: Setup VNC
        run: |
          set -e
          mkdir -p ~/.vnc

          echo "android123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup << 'XEOF'
#!/bin/bash
unset SESSION_MANAGER
unset DBUS_SESSION_BUS_ADDRESS
export XDG_CURRENT_DESKTOP=XFCE
dbus-launch --exit-with-session startxfce4 &
wait
XEOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC Server
        run: |
          set -e

          vncserver :1 -geometry 1366x768 -depth 24 -localhost no -SecurityTypes VncAuth || {
            echo "вќЊ CRASH: VNC failed to start at $(date)" > output/output.txt
            git add output/output.txt && git commit -m "crash" && git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git
            exit 1
          }
          sleep 5

          echo "вњ… VNC running! Starting bore tunnel..." > output/output.txt
          git add output/output.txt && git commit -m "vnc ok $(date +%s)" && git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git

      - name: Apply Theme
        run: |
          export DISPLAY=:1
          sleep 2
          xfconf-query -c xsettings -p /Net/ThemeName -s "Arc-Dark" 2>/dev/null || true
          xfconf-query -c xsettings -p /Net/IconThemeName -s "Papirus-Dark" 2>/dev/null || true
          xfconf-query -c xsettings -p /Gtk/FontName -s "Noto Sans 10" 2>/dev/null || true
          echo "вњ… Theme Applied"

      - name: bore Tunnel + Keep Alive
        run: |
          mkdir -p output

          push_status() {
            printf '%s\n' "$1" > output/output.txt
            git add output/output.txt
            git commit -m "status $(date +%s)" || true
            git push https://error404unknownuser99-ux:${{ secrets.GITHUB_TOKEN }}@github.com/error404unknownuser99-ux/Claude.git || true
          }

          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz -o bore.tar.gz || {
            push_status "вќЊ CRASH: bore download failed at $(date)"
            exit 1
          }
          tar xzf bore.tar.gz && chmod +x bore

          ./bore local 5901 --to bore.pub > /tmp/bore_log.txt 2>&1 &
          BORE_PID=$!

          push_status "вЏі bore tunnel connecting... $(date)"

          for i in {1..25}; do
            sleep 2
            grep -q "listening" /tmp/bore_log.txt 2>/dev/null && break
          done

          BORE_PORT=$(grep -oP '(?<=bore\.pub:)\d+' /tmp/bore_log.txt | head -1)
          [ -z "$BORE_PORT" ] && BORE_PORT=$(grep -oP '\d{5}' /tmp/bore_log.txt | tail -1)

          if [ -z "$BORE_PORT" ]; then
            push_status "вќЊ CRASH: bore port not found! Log: $(cat /tmp/bore_log.txt)"
            exit 1
          fi

          push_status "$(printf 'в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—\nв•‘   VNC DESKTOP SESSION ACTIVE! рџ–ҐпёЏ    в•‘\nв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ\n\nрџЊђ VNC Address : bore.pub:%s\nрџ”‘ Password    : android123\nрџ–ҐпёЏ  Resolution  : 1366x768\nрџЋЁ Theme       : Arc-Dark + Papirus Icons\nвЏ° Started At  : %s\nвњ… Status      : RUNNING рџ’љ\n\nрџ“± App: VNC Viewer (RealVNC)\n   bore.pub:%s | Pass: android123\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ' "$BORE_PORT" "$(date)" "$BORE_PORT")"

          COUNTER=0
          while kill -0 $BORE_PID 2>/dev/null; do
            sleep 10
            COUNTER=$((COUNTER + 10))
            UPTIME_MIN=$((COUNTER / 60))

            if [ $((COUNTER % 60)) -eq 0 ]; then
              LIVE_PORT=$(grep -oP '(?<=bore\.pub:)\d+' /tmp/bore_log.txt | head -1)
              [ -z "$LIVE_PORT" ] && LIVE_PORT=$BORE_PORT

              push_status "$(printf 'рџ–ҐпёЏ VNC LIVE | bore.pub:%s | Pass: android123\nвЏ±пёЏ Uptime: %s min | Updated: %s\nвњ… Status: RUNNING рџ’љ' "$LIVE_PORT" "$UPTIME_MIN" "$(date)")"
            fi
          done

          push_status "вќЊ VNC Session Ended at $(date) | Was running for ${UPTIME_MIN} min"
