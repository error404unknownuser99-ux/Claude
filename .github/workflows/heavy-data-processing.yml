name: 🤖 Android Emulator + VNC

on:
  workflow_dispatch:

jobs:
  android-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Download F-Droid APK
        run: |
          curl -L https://f-droid.org/F-Droid.apk -o fdroid.apk
          echo "✅ F-Droid Downloaded!"

      - name: 🖥️ Start Virtual Display + VNC + bore PEHLE
        run: |
          # Packages install karo
          sudo apt-get install -y x11vnc xvfb

          # Virtual display start karo
          Xvfb :99 -screen 0 720x1280x24 &
          export DISPLAY=:99
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

          # VNC start karo
          x11vnc -display :99 -nopw -forever -shared -bg -o /tmp/x11vnc.log
          sleep 2
          echo "✅ VNC Ready on port 5900!"

          # bore install + tunnel background mein
          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx -C /usr/local/bin
          chmod +x /usr/local/bin/bore

          # Background mein chalao aur port save karo
          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore.log &
          sleep 5

          echo "======================================"
          cat /tmp/bore.log
          echo "======================================"
          echo "📱 Upar wale log mein port number dekho!"
          echo "Host = bore.pub | Pass = nahi"
          echo "======================================"

      - name: 📱 Android Emulator — Same Display Pe!
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: :99       # ✅ Yahi fix hai — same display!
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          ram-size: 4096M
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "✅ Emulator ab :99 display pe chal raha hai!"
            adb install fdroid.apk
            echo "✅ F-Droid Installed!"
            adb shell monkey -p org.fdroid.fdroid 1

            # Jab tak job chale — bore alive rahe
            echo "🔄 Session chal raha hai..."
            sleep 18000

      - name: 🔐 SSH via Termux
        uses: mxschmitt/action-tmate@v3
        if: always()
