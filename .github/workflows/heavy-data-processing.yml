name: AI Image Generator - Live Server

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📦 Installing Flask + requests..." >> output/runtimelogs.txt
          pip install -q flask requests
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Install done!" >> output/runtimelogs.txt

      - name: Install bore tunnel
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚇 Installing bore..." >> output/runtimelogs.txt
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz -o bore.tar.gz
          tar xz -f bore.tar.gz
          chmod +x bore
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ bore installed!" >> output/runtimelogs.txt

      - name: Start Flask server
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚀 Starting Flask server..." >> output/runtimelogs.txt
          nohup python scripts/process_data.py > output/flask.log 2>&1 &
          sleep 3
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Flask started!" >> output/runtimelogs.txt

      - name: Start bore & commit URL
        run: |
          nohup ./bore local 5000 --to bore.pub > output/bore.log 2>&1 &
          sleep 5
          BORE_PORT=$(grep -o 'remote_port=[0-9]*' output/bore.log | grep -o '[0-9]*$' | head -1)
          BORE_URL="http://bore.pub:${BORE_PORT}"
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🎉 LIVE URL: ${BORE_URL}" >> output/runtimelogs.txt
          echo "BORE_URL=${BORE_URL}" >> output/runtimelogs.txt

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🌐 Live URL: ${BORE_URL}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 3
          done

      - name: Keep alive 30 minutes
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ⏳ Server alive for 30 minutes..." >> output/runtimelogs.txt
          sleep 1800
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ⏰ Done!" >> output/runtimelogs.txt

      - name: Final commit
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Final output"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 3
          done
