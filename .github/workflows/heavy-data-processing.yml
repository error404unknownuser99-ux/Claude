name: Windows RDP via bore.pub

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Enable RDP and Create User
        shell: pwsh
        run: |
          $pass = "BoreRDP@2025!"
          net user liveuser $pass /add
          net localgroup administrators liveuser /add
          net localgroup "Remote Desktop Users" liveuser /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          netsh advfirewall firewall add rule name="RDP-3389" protocol=TCP dir=in localport=3389 action=allow
          Write-Host "RDP Enabled!"

      - name: ULTRA OPTIMIZE Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "SilentlyContinue"
          
          Write-Host "=== Killing useless services ==="
          $services = @(
            "WSearch","SysMain","DiagTrack","dmwappushservice",
            "RetailDemo","MapsBroker","WerSvc","Themes",
            "Spooler","Fax","XblAuthManager","XblGameSave",
            "XboxNetApiSvc","WdNisSvc","WinDefend"
          )
          foreach ($svc in $services) {
            try { Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue } catch {}
            try { Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue } catch {}
          }
          Write-Host "Services killed!"

          Write-Host "=== ALL Animations OFF ==="
          $null = New-Item -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Force -ErrorAction SilentlyContinue
          $null = New-Item -Path "HKCU:\Control Panel\Desktop\WindowMetrics" -Force -ErrorAction SilentlyContinue
          $null = New-Item -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2 -Type DWord -Force
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "MenuShowDelay" -Value "0" -Type String -Force
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "DragFullWindows" -Value "0" -Type String -Force
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop\WindowMetrics" -Name "MinAnimate" -Value "0" -Type String -Force
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "FontSmoothing" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "EnableTransparency" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "AppsUseLightTheme" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "SystemUsesLightTheme" -Value 0 -Type DWord -Force
          Write-Host "Animations + Transparency OFF!"

          Write-Host "=== MAX CPU - High Performance ==="
          & powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          Write-Host "Power plan set!"

          Write-Host "=== RDP Color Depth = 16bit ==="
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "ColorDepth" -Value 4 -Type DWord -Force

          Write-Host "=== Disable Telemetry ==="
          $null = New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Name "AllowTelemetry" -Value 0 -Type DWord -Force

          Write-Host "=== RAM Status ==="
          $os = Get-CimInstance Win32_OperatingSystem
          $freeRam = [math]::Round($os.FreePhysicalMemory/1MB, 2)
          Write-Host "Free RAM: ${freeRam} GB"
          Write-Host "OPTIMIZATION COMPLETE!"

      - name: Download bore
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip -UseBasicParsing
          Expand-Archive bore.zip -DestinationPath . -Force
          Write-Host "bore downloaded!"

      - name: Start bore tunnel with auto-reconnect and commit port
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          $attempt = 0
          while ($true) {
            $attempt++
            Write-Host "=== Tunnel attempt #$attempt ==="
            Remove-Item "output\bore_out.txt","output\bore_err.txt" -ErrorAction SilentlyContinue

            $proc = Start-Process -FilePath ".\bore.exe" `
              -ArgumentList "local 3389 --to bore.pub" `
              -RedirectStandardOutput "output\bore_out.txt" `
              -RedirectStandardError "output\bore_err.txt" `
              -NoNewWindow -PassThru

            Start-Sleep -Seconds 8

            $out = Get-Content "output\bore_out.txt" -Raw -ErrorAction SilentlyContinue
            $err = Get-Content "output\bore_err.txt" -Raw -ErrorAction SilentlyContinue
            $combined = "$out $err"

            if ($combined -match "listening at bore\.pub:(\d+)") {
              $port = $Matches[1]
              Write-Host "TUNNEL LIVE on port: $port"

              "USERNAME: liveuser" | Out-File output\rdp_credentials.txt -Encoding UTF8
              "PASSWORD: BoreRDP@2025!" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
              "ADDRESS: bore.pub:$port" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
              "ATTEMPT: $attempt" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8

              git add output/
              git diff --staged --quiet
              if ($LASTEXITCODE -ne 0) {
                git commit -m "RDP LIVE bore.pub:$port (attempt $attempt)"
                for ($i = 0; $i -lt 5; $i++) {
                  Remove-Item "output\bore_out.txt","output\bore_err.txt" -ErrorAction SilentlyContinue
                  git pull --rebase origin main
                  git push origin HEAD:main
                  if ($LASTEXITCODE -eq 0) { break }
                  Start-Sleep -Seconds 2
                }
              }

              Write-Host "Waiting for bore process..."
              $proc.WaitForExit()
              Write-Host "Bore exited! Reconnecting in 5 sec..."
              Start-Sleep -Seconds 5
            } else {
              Write-Host "Port not found, retrying..."
              Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 5
            }
          }
