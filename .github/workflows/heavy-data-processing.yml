name: 🔬 Heavy Data Processing

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 🧹 Cleanup output/ (logs/ ko chhodke)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 output/ folder clean kar rahe hain (logs/ safe hai)..."
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          # output/ ke andar sab delete karo except logs/
          find output/ -mindepth 1 -maxdepth 1 ! -name 'logs' -exec rm -rf {} +

          # Git mein bhi reflect karo
          git add -A
          git diff --staged --quiet || git commit -m "🧹 Cleanup output/ before new run [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push

          echo "✅ Cleanup done! output/logs/ safe hai."

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: |
          mkdir -p output
          echo "📦 Installing... $(date)" | tee output/processing_log.txt
          pip install -q requests
          echo "✅ Done: $(date)" | tee -a output/processing_log.txt

      - name: Run GitHub API analysis
        run: |
          echo "🚀 Script start: $(date)" | tee -a output/processing_log.txt
          python scripts/process_data.py 2>&1 | tee -a output/processing_log.txt
          echo "✅ Script done: $(date)" | tee -a output/processing_log.txt

      - name: Show results
        run: |
          echo "--- Output files ---"
          ls -lh output/
          echo ""
          echo "--- summary.json ---"
          cat output/summary.json
          echo ""
          echo "--- Top repos (first 5) ---"
          head -6 output/top_python_repos.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-analysis-output
          path: output/

      - name: Commit output to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 GitHub API analysis output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push

      - name: Hit Monitor /full
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://track-workflow.onrender.com/full)
          echo "✅ Monitor hit: $STATUS"
