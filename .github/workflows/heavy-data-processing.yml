name: Ubuntu MATE Cyberpunk RDP

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: System Optimize
        run: |
          sudo swapoff -a
          echo 0 | sudo tee /proc/sys/vm/swappiness
          sudo systemctl stop snapd 2>/dev/null || true
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl stop apt-daily.timer 2>/dev/null || true
          echo "RAM: $(free -h | grep Mem | awk '{print $2}') | Optimized!"

      - name: Install MATE + XRDP
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            mate-desktop-environment-core \
            mate-terminal mate-system-monitor \
            xrdp dbus-x11 x11-xserver-utils xorgxrdp \
            papirus-icon-theme arc-theme \
            fonts-noto fonts-firacode \
            wget curl git unzip firefox \
            neofetch
          echo "Packages installed!"

      - name: Create User + Dark Theme
        run: |
          sudo useradd -m -s /bin/bash cyberpunk 2>/dev/null || true
          echo "cyberpunk:Cyber@2025!" | sudo chpasswd
          sudo usermod -aG sudo cyberpunk

          sudo mkdir -p /home/cyberpunk/.config/gtk-3.0
          sudo mkdir -p /home/cyberpunk/.config/dconf

          # Arc-Dark theme for MATE
          sudo tee /home/cyberpunk/.config/gtk-3.0/settings.ini > /dev/null << 'EOF'
          [Settings]
          gtk-theme-name=Arc-Dark
          gtk-icon-theme-name=Papirus-Dark
          gtk-font-name=Noto Sans 10
          gtk-enable-animations=0
          EOF

          sudo tee /home/cyberpunk/.gtkrc-2.0 > /dev/null << 'EOF'
          gtk-theme-name="Arc-Dark"
          gtk-icon-theme-name="Papirus-Dark"
          gtk-font-name="Noto Sans 10"
          gtk-enable-animations=0
          EOF

          sudo chown -R cyberpunk:cyberpunk /home/cyberpunk/
          echo "User configured!"

      - name: Configure XRDP - MATE
        run: |
          sudo adduser xrdp ssl-cert 2>/dev/null || true

          # autorun=Xorg - Xvnc nahi!
          sudo sed -i 's/^autorun=$/autorun=Xorg/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          # PROVEN WORKING startwm.sh - MATE + proper runtime dir
          sudo tee /etc/xrdp/startwm.sh > /dev/null << 'EOF'
          #!/bin/sh
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime-$(id -u)
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR
          exec dbus-run-session -- mate-session
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh

          sudo systemctl restart xrdp
          sleep 4
          sudo systemctl status xrdp --no-pager | head -8
          echo "XRDP + MATE configured!"

      - name: Start bore tunnel with Auto-Reconnect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "=== Tunnel attempt #$attempt ==="
            ./bore local 3389 --to bore.pub > output/bore_out.txt 2>&1 &
            BORE_PID=$!
            sleep 8
            PORT=$(grep -oP 'listening at bore\.pub:\K\d+' output/bore_out.txt 2>/dev/null)
            if [ -n "$PORT" ]; then
              echo "TUNNEL LIVE! bore.pub:$PORT"
              cat > output/rdp_credentials.txt << CREDS
          USERNAME: cyberpunk
          PASSWORD: Cyber@2025!
          ADDRESS:  bore.pub:$PORT
          ATTEMPT:  $attempt
          CREDS
              git add output/
              git diff --staged --quiet || (git commit -m "MATE RDP LIVE bore.pub:$PORT" && \
                for i in 1 2 3 4 5; do
                  git pull --rebase origin main && git push && break
                  sleep 2
                done)
              wait $BORE_PID
              echo "Bore exited! Reconnecting in 5s..."
              sleep 5
            else
              echo "Port not found, retrying..."
              kill $BORE_PID 2>/dev/null || true
              sleep 5
            fi
          done
