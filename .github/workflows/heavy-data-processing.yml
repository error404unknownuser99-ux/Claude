name: APK Download Test

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download APK
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚀 APK download start..." >> output/runtimelogs.txt

          # Simple Flashlight - open source APK from F-Droid
          curl -L -o output/simple-flashlight.apk \
            "https://f-droid.org/repo/com.simplemobiletools.flashlight_57.apk"

          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Download done!" >> output/runtimelogs.txt

          SIZE=$(wc -c < output/simple-flashlight.apk)
          SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📦 Size: $SIZE bytes (~${SIZE_MB} MB)" >> output/runtimelogs.txt

          # APK verification - check PK header (ZIP magic bytes)
          MAGIC=$(xxd output/simple-flashlight.apk | head -1)
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🔍 Magic bytes: $MAGIC" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🎉 APK ready!" >> output/runtimelogs.txt

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 APK download output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push
