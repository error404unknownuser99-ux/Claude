name: 🔬 Heavy Data Processing

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install heavy Python libraries
        run: |
          mkdir -p output
          echo "📦 Installing... $(date)" | tee output/processing_log.txt
          pip install -q numpy pandas scipy scikit-learn matplotlib seaborn
          echo "✅ Install complete: $(date)" | tee -a output/processing_log.txt
          pip list | grep -E "numpy|pandas|scipy|scikit|matplotlib|seaborn" | tee -a output/processing_log.txt

      - name: Run data processing script
        run: |
          echo "🚀 Script: $(date)" | tee -a output/processing_log.txt
          python scripts/process_data.py 2>&1 | tee -a output/processing_log.txt
          echo "✅ Script done: $(date)" | tee -a output/processing_log.txt

      - name: Show output files
        run: |
          ls -lh output/
          cat output/summary.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-processing-output
          path: output/

      - name: Commit output to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Data processing output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push

      - name: Hit Monitor /full
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://track-workflow.onrender.com/full)
          echo "Monitor HTTP Status: $STATUS"
