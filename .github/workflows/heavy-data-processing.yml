name: GitHub Speed Test

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Speed Test
        run: |
          mkdir -p output
          echo "🚀 Speed test start!"
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🚀 Speed test start!" > output/runtimelogs.txt

          # Download 1GB to /dev/null - max speed test!
          curl -o /dev/null \
            --max-time 20 \
            -w "Downloaded: %{size_download} bytes\nSpeed: %{speed_download} bytes/sec\nTime: %{time_total}s\n" \
            "https://speed.cloudflare.com/__down?bytes=1073741824" 2>/dev/null | tee -a output/runtimelogs.txt

          # Calculate MB/s
          SPEED_BPS=$(grep "Speed:" output/runtimelogs.txt | awk '{print $2}' | cut -d. -f1)
          SPEED_MBPS=$(echo "scale=2; $SPEED_BPS / 1048576" | bc)
          SIZE_BYTES=$(grep "Downloaded:" output/runtimelogs.txt | awk '{print $2}')
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          echo "📊 Speed: ${SPEED_MBPS} MB/s"
          echo "📦 Downloaded in 20s: ${SIZE_MB} MB"
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 📊 Speed: ${SPEED_MBPS} MB/s" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 📦 Downloaded in 20s: ${SIZE_MB} MB" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🎉 Test complete!" >> output/runtimelogs.txt
          cat output/runtimelogs.txt

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Speed test result [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push
