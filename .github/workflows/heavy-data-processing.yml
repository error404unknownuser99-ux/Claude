name: Ubuntu XFCE RDP

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: System Optimize
        run: |
          sudo swapoff -a
          echo 0 | sudo tee /proc/sys/vm/swappiness
          sudo systemctl stop snapd 2>/dev/null || true
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl stop apt-daily.timer 2>/dev/null || true
          echo "RAM: $(free -h | grep Mem | awk '{print $2}') | Done!"

      - name: Install XFCE + XRDP
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xfce4 xfce4-terminal xfce4-goodies \
            xrdp dbus-x11 dbus-user-session x11-xserver-utils xorgxrdp \
            fonts-noto papirus-icon-theme arc-theme \
            wget curl git unzip firefox \
            xfce4-taskmanager neofetch
          echo "Done!"

      - name: Setup XFCE for BOTH runner + cyberpunk user
        run: |
          # cyberpunk user banao
          sudo useradd -m -s /bin/bash cyberpunk 2>/dev/null || true
          echo "cyberpunk:Cyber@2025!" | sudo chpasswd
          sudo usermod -aG sudo cyberpunk

          # BOTH users ke liye config setup karo
          for USER_HOME in /home/runner /home/cyberpunk; do
            sudo mkdir -p $USER_HOME/.config/xfce4/xfconf/xfce-perchannel-xml
            sudo mkdir -p $USER_HOME/.config/gtk-3.0
            sudo mkdir -p $USER_HOME/.config/caja

            sudo tee $USER_HOME/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml > /dev/null << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Arc-Dark"/>
              <property name="use_compositing" type="bool" value="false"/>
              <property name="animate_mouse" type="bool" value="false"/>
              <property name="box_move" type="bool" value="false"/>
              <property name="box_resize" type="bool" value="false"/>
            </property>
          </channel>
          EOF

            sudo tee $USER_HOME/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml > /dev/null << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Arc-Dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
              <property name="EnableAnimations" type="bool" value="false"/>
            </property>
          </channel>
          EOF

            sudo tee $USER_HOME/.config/gtk-3.0/settings.ini > /dev/null << 'EOF'
          [Settings]
          gtk-theme-name=Arc-Dark
          gtk-icon-theme-name=Papirus-Dark
          gtk-font-name=Noto Sans 10
          gtk-enable-animations=0
          EOF

            sudo tee $USER_HOME/.gtkrc-2.0 > /dev/null << 'EOF'
          gtk-theme-name="Arc-Dark"
          gtk-icon-theme-name="Papirus-Dark"
          gtk-font-name="Noto Sans 10"
          gtk-enable-animations=0
          EOF
          done

          # runner user ko sudo de do
          sudo usermod -aG sudo runner 2>/dev/null || true
          echo "runner:Runner@2025!" | sudo chpasswd

          sudo chown -R cyberpunk:cyberpunk /home/cyberpunk/
          sudo chown -R runner:runner /home/runner/ 2>/dev/null || true
          echo "Both users configured!"

      - name: Configure XRDP - DBUS FIX
        run: |
          sudo adduser xrdp ssl-cert 2>/dev/null || true
          sudo sed -i 's/^autorun=$/autorun=Xorg/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          # KEY FIX: eval dbus-launch --sh-syntax use karo
          # dbus-run-session DBUS_ADDRESS properly export nahi karta!
          sudo tee /etc/xrdp/startwm.sh > /dev/null << 'EOF'
          #!/bin/sh
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export XDG_DATA_DIRS=/usr/local/share:/usr/share
          eval $(dbus-launch --sh-syntax --exit-with-session)
          export DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh

          sudo systemctl restart xrdp
          sleep 3
          sudo systemctl status xrdp --no-pager | head -5
          echo "XRDP Ready!"

      - name: Start bore tunnel with Auto-Reconnect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "=== Tunnel attempt #$attempt ==="
            ./bore local 3389 --to bore.pub > output/bore_out.txt 2>&1 &
            BORE_PID=$!
            sleep 8
            PORT=$(grep -oP 'listening at bore\.pub:\K\d+' output/bore_out.txt 2>/dev/null)
            if [ -n "$PORT" ]; then
              echo "TUNNEL LIVE! bore.pub:$PORT"
              cat > output/rdp_credentials.txt << CREDS
          USERNAME: cyberpunk  (ya runner)
          PASSWORD: Cyber@2025! (ya Runner@2025!)
          ADDRESS:  bore.pub:$PORT
          ATTEMPT:  $attempt
          CREDS
              git add output/
              git diff --staged --quiet || (git commit -m "Ubuntu RDP LIVE bore.pub:$PORT" && \
                for i in 1 2 3 4 5; do
                  git pull --rebase origin main && git push && break
                  sleep 2
                done)
              wait $BORE_PID
              echo "Bore exited! Reconnecting..."
              sleep 5
            else
              kill $BORE_PID 2>/dev/null || true
              sleep 5
            fi
          done
