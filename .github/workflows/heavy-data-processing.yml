name: Calculator on bore.pub

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
      - 'scripts/calculator.html'
  workflow_dispatch:

jobs:
  serve-calculator:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Setup output folder
        run: |
          mkdir -p output/logs
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚀 Workflow started!" >> output/runtimelogs.txt

      - name: Install bore
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📦 Installing bore..." >> output/runtimelogs.txt
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin/ bore
          chmod +x /usr/local/bin/bore
          bore --version
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ bore installed!" >> output/runtimelogs.txt

      - name: Setup web server folder
        run: |
          mkdir -p /tmp/www
          cp scripts/calculator.html /tmp/www/index.html
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📁 Calculator HTML ready" >> output/runtimelogs.txt

      - name: Start HTTP server + bore tunnel
        run: |
          cd /tmp/www && python3 -m http.server 8080 > /tmp/http.log 2>&1 &
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🌐 HTTP server started on port 8080" >> output/runtimelogs.txt

          bore local 8080 --to bore.pub > /tmp/bore.log 2>&1 &
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🕳️  bore tunnel starting..." >> output/runtimelogs.txt

          sleep 8

          PORT=$(grep -oP '(?<=bore\.pub:)\d+' /tmp/bore.log | head -1)
          echo "[$(date -u)] bore log: $(cat /tmp/bore.log)" >> output/runtimelogs.txt

          if [ -n "$PORT" ]; then
            URL="http://bore.pub:$PORT"
            echo "$URL" > output/url.txt
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Calculator LIVE at: $URL" >> output/runtimelogs.txt
            echo "======================================"
            echo "🔥 Calculator URL: $URL"
            echo "======================================"
          else
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [ERROR] ❌ Could not extract bore port!" >> output/runtimelogs.txt
            exit 1
          fi

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🔗 Calculator URL: $URL"
          git pull --rebase origin main
          git push

          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📌 URL pushed to output/url.txt!" >> output/runtimelogs.txt

      - name: Keep alive 30 minutes
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ⏳ Server alive for 30 min..." >> output/runtimelogs.txt
          for i in 1 2 3 4 5 6; do
            sleep 300
            MIN=$((i * 5))
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Still running... ${MIN}/30 min" >> output/runtimelogs.txt
            git config user.name "error404unknownuser99-ux"
            git config user.email "error404unknownuser99@users.noreply.github.com"
            git add output/runtimelogs.txt
            git diff --staged --quiet || git commit -m "⏰ Alive ${MIN}min"
            git pull --rebase origin main
            git push
          done

      - name: Final commit
        if: always()
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🏁 Workflow ending" >> output/runtimelogs.txt
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🏁 Done"
          git pull --rebase origin main
          git push
