name: 🧪 Log Gen Kadak Test

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  log-gen-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Git Config
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

      - name: 🪵 Setup BASH_ENV (detailedlog ke liye)
        run: |
          mkdir -p output
          echo 'exec > >(while IFS= read -r line; do echo "[$(date -u +%H:%M:%S)] $line"; done | tee -a "$GITHUB_WORKSPACE/output/detailedlog.txt") 2>&1' > /tmp/autolog.sh
          echo "BASH_ENV=/tmp/autolog.sh" >> "$GITHUB_ENV"
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🚀 Workflow started!" > output/detailedlog.txt

      - name: 📦 Install dependencies
        run: pip install requests -q

      - name: 🧪 Run Kadak Test
        run: python scripts/process_data.py

      - name: 💾 Final Commit (agar kuch bacha ho)
        if: always()
        run: |
          git add output/
          git diff --staged --quiet || git commit -m "✅ Final logs [$(date '+%H:%M:%S')]"
          git pull --rebase origin main && git push || true
