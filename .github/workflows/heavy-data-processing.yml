name: 🖥️ Ubuntu Desktop - RustDesk

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🗂️ Setup folders
        run: mkdir -p output scripts

      - name: 📦 Install Desktop + Virtual Display
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🚀 Setup shuru..." | tee -a "$LOG"
          sudo apt-get update -qq
          echo "[$(date -u '+%H:%M:%S')] 📦 XFCE4 + Xvfb install ho raha hai..." | tee -a "$LOG"
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xvfb dbus-x11 \
            xserver-xorg-video-dummy x11-xserver-utils \
            --no-install-recommends -qq
          echo "[$(date -u '+%H:%M:%S')] ✅ Desktop installed!" | tee -a "$LOG"

      - name: 🖥️ Start Virtual Display + XFCE
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🖥️ Virtual display start ho raha hai..." | tee -a "$LOG"

          # Xvfb virtual display
          Xvfb :10 -screen 0 1920x1080x24 +extension RANDR +extension GLX &
          sleep 3
          export DISPLAY=:10
          echo "export DISPLAY=:10" >> $GITHUB_ENV

          # XFCE start karo usi display pe
          DISPLAY=:10 dbus-launch --exit-with-session startxfce4 &
          sleep 5

          echo "[$(date -u '+%H:%M:%S')] ✅ Virtual display :10 ready!" | tee -a "$LOG"

      - name: 📥 Install RustDesk
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 📥 RustDesk download ho raha hai..." | tee -a "$LOG"

          # Latest RustDesk .deb download
          RUSTDESK_URL="https://github.com/rustdesk/rustdesk/releases/download/1.3.8/rustdesk-1.3.8-x86_64.deb"
          wget -q "$RUSTDESK_URL" -O /tmp/rustdesk.deb
          
          echo "[$(date -u '+%H:%M:%S')] 📦 RustDesk install ho raha hai..." | tee -a "$LOG"
          sudo apt-get install -f -y -qq
          sudo dpkg -i /tmp/rustdesk.deb || sudo apt-get install -f -y -qq
          
          echo "[$(date -u '+%H:%M:%S')] ✅ RustDesk installed!" | tee -a "$LOG"

      - name: 🚀 Start RustDesk + Get ID
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🚀 RustDesk start ho raha hai..." | tee -a "$LOG"

          export DISPLAY=:10

          # RustDesk service start
          sudo systemctl start rustdesk 2>/dev/null || true
          sleep 2

          # RustDesk background mein chalaao
          DISPLAY=:10 rustdesk &
          sleep 8

          # ID nikalo
          RUSTDESK_ID=$(rustdesk --get-id 2>/dev/null | tr -d '[:space:]')
          
          # Password set karo
          RUSTDESK_PASS="Connect@999"
          rustdesk --password "$RUSTDESK_PASS" 2>/dev/null || true
          sleep 3

          # Verify ID
          if [ -n "$RUSTDESK_ID" ]; then
            echo "[$(date -u '+%H:%M:%S')] 🎉🎉 RUSTDESK READY! 🎉🎉" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
            echo "   🖥️  RUSTDESK CONNECTION INFO" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
            echo "   🔢 ID:       $RUSTDESK_ID" | tee -a "$LOG"
            echo "   🔑 Password: $RUSTDESK_PASS" | tee -a "$LOG"
            echo "   📱 App:      rustdesk.com/download" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
          else
            echo "[$(date -u '+%H:%M:%S')] ⚠️ ID nahi mila! Dobara try kar raha hun..." | tee -a "$LOG"
            sleep 5
            RUSTDESK_ID=$(rustdesk --get-id 2>/dev/null | tr -d '[:space:]')
            echo "[$(date -u '+%H:%M:%S')] ID attempt 2: '$RUSTDESK_ID'" | tee -a "$LOG"
            
            # Try config file se bhi
            CONFIG_ID=$(cat ~/.config/rustdesk/RustDesk2.toml 2>/dev/null | grep "id = " | head -1 | cut -d'"' -f2)
            echo "[$(date -u '+%H:%M:%S')] Config ID: '$CONFIG_ID'" | tee -a "$LOG"
            
            FINAL_ID="${RUSTDESK_ID:-$CONFIG_ID}"
            echo "[$(date -u '+%H:%M:%S')] 🔢 Final ID: $FINAL_ID | 🔑 Pass: $RUSTDESK_PASS" | tee -a "$LOG"
          fi

      - name: 💾 Push Connection Info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🖥️ RustDesk live! ID ready"
          git pull --rebase origin main
          git push

      - name: ⏳ Keep Alive (5.5 hours)
        run: |
          LOG="output/runtimelogs.txt"
          RUSTDESK_ID=$(rustdesk --get-id 2>/dev/null | tr -d '[:space:]')
          echo "[$(date -u '+%H:%M:%S')] ⏳ Session alive! ID: $RUSTDESK_ID" | tee -a "$LOG"
          COUNT=0
          while true; do
            sleep 300
            COUNT=$((COUNT + 5))
            # RustDesk alive check
            RD_ALIVE=$(pgrep rustdesk > /dev/null && echo "✅ alive" || echo "❌ dead")
            echo "[$(date -u '+%H:%M:%S')] [${COUNT}min] RustDesk: $RD_ALIVE | ID: $RUSTDESK_ID" | tee -a "$LOG"
            
            # RustDesk band ho gaya toh restart
            if echo "$RD_ALIVE" | grep -q "dead"; then
              echo "[$(date -u '+%H:%M:%S')] 🔄 RustDesk restart..." | tee -a "$LOG"
              export DISPLAY=:10
              DISPLAY=:10 rustdesk &
              sleep 8
            fi

            if [ "$COUNT" -ge 330 ]; then
              echo "[$(date -u '+%H:%M:%S')] ⏰ 5.5hr done!" | tee -a "$LOG"
              break
            fi
          done
