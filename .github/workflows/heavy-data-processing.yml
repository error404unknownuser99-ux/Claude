name: 🖥️ Ubuntu Desktop via XRDP + bore.pub

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🗂️ Setup output folder
        run: mkdir -p output

      - name: 📦 Install XFCE + XRDP (Black Screen Fix)
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🚀 Setup start..." | tee -a "$LOG"
          sudo apt-get update -qq

          # gdm3 hatao - black screen ka main culprit!
          sudo DEBIAN_FRONTEND=noninteractive apt-get remove -y gdm3 gnome-session || true

          echo "[$(date -u '+%H:%M:%S')] 📦 XFCE4 + XRDP install..." | tee -a "$LOG"
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies \
            xrdp \
            xorg \
            dbus-x11 \
            x11-xserver-utils \
            xfce4-terminal \
            --no-install-recommends -qq

          echo "[$(date -u '+%H:%M:%S')] ✅ Install done!" | tee -a "$LOG"

      - name: 👤 Create RDP User
        run: |
          LOG="output/runtimelogs.txt"
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:Desktop@123" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          echo "[$(date -u '+%H:%M:%S')] ✅ User: rdpuser / Desktop@123" | tee -a "$LOG"

      - name: ⚙️ Fix XRDP Black Screen - Proper Config
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🔧 Black screen fix apply kar raha hai..." | tee -a "$LOG"

          # Method 1: .xsession file properly set karo
          sudo bash -c 'cat > /home/rdpuser/.xsession << EOF
export XDG_SESSION_TYPE=x11
export XDG_CURRENT_DESKTOP=XFCE
export XDG_SESSION_DESKTOP=xfce
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
exec startxfce4
EOF'
          sudo chmod +x /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          # Method 2: startwm.sh override - XRDP ka default session changer
          sudo bash -c 'cat > /etc/xrdp/startwm.sh << EOF
#!/bin/sh
export XDG_SESSION_TYPE=x11
export XDG_CURRENT_DESKTOP=XFCE
export XDG_SESSION_DESKTOP=xfce
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
exec startxfce4
EOF'
          sudo chmod +x /etc/xrdp/startwm.sh

          # Method 3: xrdp.ini - Xvfb use karo display ke liye
          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini || true
          sudo sed -i 's/^port=3389/port=3389/' /etc/xrdp/xrdp.ini || true

          # sesman.ini - proper session type
          sudo sed -i 's/X11DisplayOffset=10/X11DisplayOffset=10/' /etc/xrdp/sesman.ini || true

          echo "[$(date -u '+%H:%M:%S')] ✅ Config fix done!" | tee -a "$LOG"

      - name: 🖥️ Start Xvfb + XRDP
        run: |
          LOG="output/runtimelogs.txt"

          # Xvfb start karo - virtual display (black screen fix!)
          sudo Xvfb :10 -screen 0 1280x800x24 &
          sleep 2
          export DISPLAY=:10

          # XRDP start
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp
          sleep 4

          STATUS=$(sudo systemctl is-active xrdp)
          echo "[$(date -u '+%H:%M:%S')] 🖥️ XRDP: $STATUS | Display: $DISPLAY" | tee -a "$LOG"

          # xrdp ssl cert fix
          sudo adduser xrdp ssl-cert 2>/dev/null || true

      - name: 🌐 bore.pub Tunnel
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 📥 bore install..." | tee -a "$LOG"
          curl -sSL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/bore.tar.gz
          tar -xzf /tmp/bore.tar.gz -C /tmp/
          sudo mv /tmp/bore /usr/local/bin/bore
          sudo chmod +x /usr/local/bin/bore

          echo "[$(date -u '+%H:%M:%S')] 🌐 Tunnel start (3389)..." | tee -a "$LOG"
          nohup bore local 3389 --to bore.pub > /tmp/bore_output.txt 2>&1 &
          echo $! > /tmp/bore.pid
          sleep 10

          BORE_LINE=$(grep -o 'bore.pub:[0-9]*' /tmp/bore_output.txt | head -1)
          if [ -n "$BORE_LINE" ]; then
            echo "[$(date -u '+%H:%M:%S')] 🎉 TUNNEL READY!" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
            echo "   🖥️  RDP CONNECTION INFO" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
            echo "   🌐 Host:     $BORE_LINE" | tee -a "$LOG"
            echo "   👤 Username: rdpuser" | tee -a "$LOG"
            echo "   🔑 Password: Desktop@123" | tee -a "$LOG"
            echo "================================================" | tee -a "$LOG"
          else
            echo "[$(date -u '+%H:%M:%S')] ⚠️ bore URL nahi mila!" | tee -a "$LOG"
            cat /tmp/bore_output.txt | tee -a "$LOG"
          fi

      - name: 💾 Push Info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🖥️ Desktop live - black screen fixed!"
          git pull --rebase origin main
          git push

      - name: ⏳ Keep Alive
        run: |
          LOG="output/runtimelogs.txt"
          BORE_LINE=$(grep -o 'bore.pub:[0-9]*' /tmp/bore_output.txt | head -1)
          echo "[$(date -u '+%H:%M:%S')] ⏳ Alive! $BORE_LINE" | tee -a "$LOG"
          COUNT=0
          while true; do
            sleep 300
            COUNT=$((COUNT + 5))
            XRDP_STATUS=$(sudo systemctl is-active xrdp)
            BORE_PID=$(cat /tmp/bore.pid 2>/dev/null)
            kill -0 "$BORE_PID" 2>/dev/null && BORE_ALIVE="alive" || BORE_ALIVE="dead"
            echo "[$(date -u '+%H:%M:%S')] [${COUNT}min] xrdp:$XRDP_STATUS bore:$BORE_ALIVE $BORE_LINE" | tee -a "$LOG"
            if [ "$BORE_ALIVE" = "dead" ]; then
              nohup bore local 3389 --to bore.pub > /tmp/bore_output.txt 2>&1 &
              echo $! > /tmp/bore.pid
              sleep 10
              BORE_LINE=$(grep -o 'bore.pub:[0-9]*' /tmp/bore_output.txt | head -1)
              echo "[$(date -u '+%H:%M:%S')] 🔄 Restarted: $BORE_LINE" | tee -a "$LOG"
            fi
            if [ "$COUNT" -ge 330 ]; then
              echo "[$(date -u '+%H:%M:%S')] ⏰ 5.5hr done!" | tee -a "$LOG"
              break
            fi
          done
