name: 🖥️ VNC + AnyDesk + RDP Remote Access

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🖥️ Start Virtual Display (Xvfb + XFCE)
        run: |
          sudo apt-get install -y xvfb x11vnc xfce4 xfce4-terminal dbus-x11 --no-install-recommends
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          startxfce4 &
          sleep 5
          echo "✅ Virtual Display + XFCE Ready!"

      - name: 🔒 Start VNC Server
        run: |
          x11vnc -display :99 -nopw -forever -shared -bg -o /tmp/x11vnc.log
          sleep 2
          echo "✅ VNC Ready on port 5900!"

      - name: 🌐 Bore Tunnel — VNC (port 5900)
        run: |
          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx -C /usr/local/bin
          chmod +x /usr/local/bin/bore
          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore_vnc.log &
          sleep 6
          echo "======================================"
          cat /tmp/bore_vnc.log
          echo "======================================"
          echo "📡 VNC: Host=bore.pub | Port=upar log mein dekho | Pass=nahi"
          echo "======================================"

      - name: 🟦 Install AnyDesk
        run: |
          echo "📦 AnyDesk install ho raha hai..."
          wget -qO - https://keys.anydesk.com/repos/DEB-GPG-KEY | sudo apt-key add - 2>/dev/null
          echo "deb http://deb.anydesk.com/ all main" | sudo tee /etc/apt/sources.list.d/anydesk-stable.list
          sudo apt-get update -q
          sudo apt-get install -y anydesk
          echo "✅ AnyDesk Installed!"

          echo "remote123" | sudo anydesk --set-password
          DISPLAY=:99 anydesk &
          sleep 5

          ANYDESK_ID=$(anydesk --get-id 2>/dev/null || echo "Check AnyDesk window")
          echo "======================================"
          echo "🟦 AnyDesk ID: $ANYDESK_ID"
          echo "🔑 AnyDesk Password: remote123"
          echo "======================================"

      - name: 🖥️ Install xRDP (RDP — Windows Remote Desktop)
        run: |
          echo "📦 xRDP install ho raha hai..."
          sudo apt-get install -y xrdp
          echo "startxfce4" | sudo tee /etc/xrdp/startwm.sh > /dev/null
          sudo chmod +x /etc/xrdp/startwm.sh
          echo "xfce4-session" > ~/.xsession
          chmod +x ~/.xsession
          echo "runner:remote123" | sudo chpasswd
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          sleep 3
          echo "✅ xRDP Status: $(sudo systemctl is-active xrdp) | Port: 3389"
          echo "🔑 RDP User: runner | Pass: remote123"

      - name: 🌐 Bore Tunnel — RDP (port 3389)
        run: |
          bore local 3389 --to bore.pub 2>&1 | tee /tmp/bore_rdp.log &
          sleep 6
          echo "======================================"
          cat /tmp/bore_rdp.log
          echo "======================================"
          echo "🖥️ RDP: Host=bore.pub | Port=upar log mein dekho"
          echo "🔑 RDP User: runner | Pass: remote123"
          echo "======================================"

      - name: ⏳ Keep Alive (5 hours)
        run: |
          echo "🔄 Session alive hai — enjoy karo!"
          echo "=== CONNECTION INFO ==="
          echo "VNC  → bore.pub : [see Bore Tunnel VNC step]  | No password"
          echo "RDP  → bore.pub : [see Bore Tunnel RDP step]  | User: runner | Pass: remote123"
          echo "AnyDesk → ID from AnyDesk step               | Pass: remote123"
          echo "======================"
          sleep 18000

      - name: 🔐 tmate SSH Fallback
        uses: mxschmitt/action-tmate@v3
        if: always()
