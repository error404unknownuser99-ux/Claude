name: JS Library CDN Download Test

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download lodash from CDN
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚀 Starting CDN download test..." >> output/runtimelogs.txt
          
          # Download lodash from cdnjs
          curl -o output/lodash.min.js https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js
          
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ lodash.min.js downloaded!" >> output/runtimelogs.txt
          
          # File size check
          SIZE=$(wc -c < output/lodash.min.js)
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📦 File size: $SIZE bytes" >> output/runtimelogs.txt
          
          # Show first line
          HEAD=$(head -c 100 output/lodash.min.js)
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📄 Preview: $HEAD" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🎉 Test complete!" >> output/runtimelogs.txt

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 CDN download output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push
