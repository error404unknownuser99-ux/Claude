name: 🪟 Windows Desktop - RDP + ngrok

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    timeout-minutes: 355

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Optimize Windows
        shell: powershell
        run: |
          # Visual FX - Best Performance
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects"
          if (!(Test-Path $path)) { New-Item -Path $path -Force | Out-Null }
          Set-ItemProperty -Path $path -Name VisualFXSetting -Value 2
          $advPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $advPath -Name TaskbarAnimations -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $advPath -Name ListviewShadow -Value 0 -ErrorAction SilentlyContinue

          # Unnecessary services band karo
          $services = @("SysMain","WSearch","DiagTrack","TabletInputService","wuauserv","BITS")
          foreach ($svc in $services) {
            Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # High Performance power plan
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c 2>$null

          Write-Host "✅ Windows optimized!"

      - name: 🖥️ Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "ColorDepth" -Value 2
          net user runneradmin "RDP@Pass123"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Restart-Service TermService -Force -ErrorAction SilentlyContinue
          Write-Host "✅ RDP enabled! User: runneradmin / RDP@Pass123"

      - name: 🌐 Install ngrok + Start Tunnel
        shell: powershell
        run: |
          mkdir -p output | Out-Null
          $LOG = "output\runtimelogs.txt"

          "[$(Get-Date -Format 'HH:mm:ss')] 📥 ngrok download..." | Tee-Object -FilePath $LOG -Append

          # ngrok download
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "C:\ngrok.zip" -UseBasicParsing
          Expand-Archive -Path "C:\ngrok.zip" -DestinationPath "C:\" -Force

          # Auth configure karo
          $env:NGROK_AUTHTOKEN = $env:NGROK_TOKEN
          C:\ngrok.exe config add-authtoken $env:NGROK_TOKEN

          "[$(Get-Date -Format 'HH:mm:ss')] 🌐 TCP Tunnel start (port 3389)..." | Tee-Object -FilePath $LOG -Append

          # ngrok TCP tunnel background mein
          $proc = Start-Process -FilePath "C:\ngrok.exe" `
            -ArgumentList "tcp 3389 --log=stdout" `
            -RedirectStandardOutput "C:\ngrok_out.txt" `
            -PassThru -WindowStyle Hidden
          $proc.Id | Out-File "C:\ngrok_pid.txt"

          Start-Sleep -Seconds 15

          # ngrok API se address nikalo
          try {
            $api = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
            $tunnel = $api.tunnels[0].public_url
            $tunnel = $tunnel -replace "tcp://", ""

            "" | Tee-Object -FilePath $LOG -Append
            "[$(Get-Date -Format 'HH:mm:ss')] 🎉🎉 TUNNEL READY!" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
            "   🪟  RDP CONNECTION INFO" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
            "   🌐 Host:     $tunnel" | Tee-Object -FilePath $LOG -Append
            "   👤 Username: runneradmin" | Tee-Object -FilePath $LOG -Append
            "   🔑 Password: RDP@Pass123" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
          } catch {
            "[$(Get-Date -Format 'HH:mm:ss')] ⚠️ API se nahi mila, log dekho:" | Tee-Object -FilePath $LOG -Append
            Get-Content "C:\ngrok_out.txt" | Tee-Object -FilePath $LOG -Append
          }
        env:
          NGROK_TOKEN: 3BJQSr9d5pNOmSTJO9Ci576O5NY_3hCpqUn3VgWzc9ygdEfkP

      - name: 💾 Push Info
        shell: powershell
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          $diff = git diff --staged --name-only
          if ($diff) { git commit -m "🪟 Windows RDP live - ngrok!" }
          git pull --rebase origin main
          git push origin main

      - name: ⏳ Keep Alive (5.5 hours)
        shell: powershell
        run: |
          $LOG = "output\runtimelogs.txt"
          try {
            $api = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
            $tunnel = $api.tunnels[0].public_url -replace "tcp://", ""
          } catch { $tunnel = "check logs" }

          "[$(Get-Date -Format 'HH:mm:ss')] ⏳ Alive! Host: $tunnel | Pass: RDP@Pass123" | Tee-Object -FilePath $LOG -Append

          $count = 0
          while ($true) {
            Start-Sleep -Seconds 300
            $count += 5
            $ngrokPid = Get-Content "C:\ngrok_pid.txt" -ErrorAction SilentlyContinue
            $alive = if (Get-Process -Id $ngrokPid -ErrorAction SilentlyContinue) { "alive" } else { "dead" }
            $rdp = (Get-Service TermService).Status
            "[$(Get-Date -Format 'HH:mm:ss')] [${count}min] ngrok:$alive RDP:$rdp Host:$tunnel" | Tee-Object -FilePath $LOG -Append

            if ($alive -eq "dead") {
              "[$(Get-Date -Format 'HH:mm:ss')] 🔄 ngrok restart..." | Tee-Object -FilePath $LOG -Append
              $proc = Start-Process -FilePath "C:\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "C:\ngrok_out.txt" -PassThru -WindowStyle Hidden
              $proc.Id | Out-File "C:\ngrok_pid.txt"
              Start-Sleep -Seconds 12
            }
            if ($count -ge 330) {
              "[$(Get-Date -Format 'HH:mm:ss')] ⏰ 5.5hr done!" | Tee-Object -FilePath $LOG -Append
              break
            }
          } 
