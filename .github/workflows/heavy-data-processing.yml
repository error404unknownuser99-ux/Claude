name: Ubuntu XFCE Cyberpunk RDP

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: System Optimize
        run: |
          swapoff -a 2>/dev/null || true
          echo 0 > /proc/sys/vm/swappiness 2>/dev/null || true
          systemctl stop snapd 2>/dev/null || true
          systemctl stop unattended-upgrades 2>/dev/null || true
          systemctl stop apt-daily.timer 2>/dev/null || true
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"

      - name: Install XFCE + XRDP
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            xfce4 xfce4-terminal xfce4-goodies \
            xrdp dbus-x11 x11-xserver-utils xorgxrdp \
            fonts-noto fonts-firacode \
            papirus-icon-theme arc-theme \
            wget curl git unzip firefox \
            xfce4-taskmanager neofetch
          echo "Packages installed!"

      - name: Create User + Setup XFCE
        run: |
          useradd -m -s /bin/bash cyberpunk 2>/dev/null || true
          echo "cyberpunk:Cyber@2025!" | chpasswd
          usermod -aG sudo cyberpunk

          mkdir -p /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml
          mkdir -p /home/cyberpunk/.config/gtk-3.0

          # .xsession - EXECUTABLE + proper env
          cat > /home/cyberpunk/.xsession << 'EOF'
          #!/bin/bash
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_SESSION_DESKTOP=xfce
          exec startxfce4
          EOF
          chmod +x /home/cyberpunk/.xsession

          # Dark theme configs
          cat > /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Arc-Dark"/>
              <property name="use_compositing" type="bool" value="false"/>
              <property name="animate_mouse" type="bool" value="false"/>
              <property name="box_move" type="bool" value="false"/>
              <property name="box_resize" type="bool" value="false"/>
            </property>
          </channel>
          EOF

          cat > /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Arc-Dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
              <property name="EnableAnimations" type="bool" value="false"/>
            </property>
          </channel>
          EOF

          cat > /home/cyberpunk/.config/gtk-3.0/settings.ini << 'EOF'
          [Settings]
          gtk-theme-name=Arc-Dark
          gtk-icon-theme-name=Papirus-Dark
          gtk-font-name=Noto Sans 10
          gtk-enable-animations=0
          EOF

          cat > /home/cyberpunk/.gtkrc-2.0 << 'EOF'
          gtk-theme-name="Arc-Dark"
          gtk-icon-theme-name="Papirus-Dark"
          gtk-enable-animations=0
          EOF

          chown -R cyberpunk:cyberpunk /home/cyberpunk/
          echo "User setup done!"

      - name: Configure XRDP - Fix Black Screen
        run: |
          adduser xrdp ssl-cert 2>/dev/null || true

          # FIX 1: startwm.sh
          cat > /etc/xrdp/startwm.sh << 'EOF'
          #!/bin/sh
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          export XDG_SESSION_DESKTOP=xfce
          exec startxfce4
          EOF
          chmod +x /etc/xrdp/startwm.sh

          # FIX 2: xorg.conf - YE THA ASLI PROBLEM! EMPTY THA!
          cat > /etc/xrdp/xorg.conf << 'EOF'
          Section "Module"
              Load "fb"
              Load "shadow"
              Load "xrdpdev"
              Load "xrdpkeyb"
              Load "xrdpmouse"
          EndSection
          Section "Device"
              Identifier "xrdpdev"
              Driver "xrdpdev"
          EndSection
          Section "Screen"
              Identifier "Screen0"
              Device "xrdpdev"
              DefaultDepth 24
              SubSection "Display"
                  Depth 24
                  Modes "1920x1080" "1280x720" "1024x768"
              EndSubSection
          EndSection
          Section "ServerLayout"
              Identifier "Layout0"
              Screen "Screen0"
              InputDevice "xrdpkeyb" "CoreKeyboard"
              InputDevice "xrdpmouse" "CorePointer"
          EndSection
          Section "InputDevice"
              Identifier "xrdpkeyb"
              Driver "xrdpkeyb"
          EndSection
          Section "InputDevice"
              Identifier "xrdpmouse"
              Driver "xrdpmouse"
          EndSection
          EOF

          # FIX 3: Performance tune
          sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          systemctl restart xrdp
          sleep 3
          systemctl status xrdp --no-pager
          echo "XRDP configured!"

      - name: Start bore tunnel with Auto-Reconnect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "=== Tunnel attempt #$attempt ==="

            ./bore local 3389 --to bore.pub > output/bore_out.txt 2>&1 &
            BORE_PID=$!
            sleep 8

            PORT=$(grep -oP 'listening at bore\.pub:\K\d+' output/bore_out.txt 2>/dev/null)

            if [ -n "$PORT" ]; then
              echo "TUNNEL LIVE! bore.pub:$PORT"
              cat > output/rdp_credentials.txt << CREDS
          USERNAME: cyberpunk
          PASSWORD: Cyber@2025!
          ADDRESS:  bore.pub:$PORT
          ATTEMPT:  $attempt
          CREDS
              git add output/
              git diff --staged --quiet || (git commit -m "Ubuntu RDP LIVE bore.pub:$PORT" && \
                for i in 1 2 3 4 5; do
                  git pull --rebase origin main && git push && break
                  sleep 2
                done)
              wait $BORE_PID
              echo "Bore exited! Reconnecting in 5s..."
              sleep 5
            else
              echo "Port not found, retrying..."
              kill $BORE_PID 2>/dev/null || true
              sleep 5
            fi
          done
