name: Windows RDP via bore.pub

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Enable RDP and Create User
        shell: pwsh
        run: |
          $pass = "BoreRDP@2025!"
          net user liveuser $pass /add
          net localgroup administrators liveuser /add
          net localgroup "Remote Desktop Users" liveuser /add

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0

          Write-Host "✅ RDP Enabled!"
          Write-Host "👤 Username : liveuser"
          Write-Host "🔑 Password : BoreRDP@2025!"

      - name: Download bore and Start Tunnel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null

          Write-Host "📥 Downloading bore..."
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $boreUrl -OutFile bore.zip -UseBasicParsing
          Expand-Archive bore.zip -DestinationPath . -Force

          Write-Host "🚇 Starting bore tunnel on port 3389..."
          Start-Process -FilePath ".\bore.exe" `
            -ArgumentList "local 3389 --to bore.pub" `
            -RedirectStandardError "output\bore_url.txt" `
            -RedirectStandardOutput "output\bore_stdout.txt" `
            -NoNewWindow -PassThru | Out-Null

          Start-Sleep -Seconds 10

          $boreOut = Get-Content "output\bore_url.txt" -Raw -ErrorAction SilentlyContinue
          $boreStd = Get-Content "output\bore_stdout.txt" -Raw -ErrorAction SilentlyContinue

          Write-Host "=== bore stderr ==="
          Write-Host $boreOut
          Write-Host "=== bore stdout ==="
          Write-Host $boreStd

          $creds = @"
======================================
  Windows RDP LIVE SESSION
======================================
Bore stderr:
$boreOut

Bore stdout:
$boreStd

CREDENTIALS:
  Username : liveuser
  Password : BoreRDP@2025!

Connect karo:
  1. bore.pub:PORT dhundho upar logs mein
  2. mstsc.exe kholo (Windows) ya Microsoft Remote Desktop (Mac)
  3. Computer: bore.pub:XXXXX
  4. Username: liveuser / Password: BoreRDP@2025!

Session max 6 ghante chalega!
======================================
"@
          $creds | Out-File output\rdp_credentials.txt -Encoding UTF8
          Write-Host $creds

      - name: Commit Credentials
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "RDP Session Live - check rdp_credentials.txt"
            for ($i = 0; $i -lt 5; $i++) {
              git pull --rebase origin main
              git push
              if ($LASTEXITCODE -eq 0) { break }
              Start-Sleep -Seconds 3
            }
          }

      - name: Keep Session Alive
        shell: pwsh
        run: |
          Write-Host "Session alive - 5.5 ghante wait karunga..."
          Write-Host "Jab tak ye step chal raha hai RDP connect kar sakte ho!"
          Start-Sleep -Seconds 19800
