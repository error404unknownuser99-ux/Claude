name: Web Scraper - example.com

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 📦 Installing libraries..." >> output/runtimelogs.txt
          pip install -q requests beautifulsoup4
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Install done!" >> output/runtimelogs.txt

      - name: Run scraper
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] 🚀 Starting scraper..." >> output/runtimelogs.txt
          python scripts/process_data.py
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] [INFO] ✅ Scraper done!" >> output/runtimelogs.txt

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Scraped output [$(date '+%Y-%m-%d %H:%M:%S')]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && echo "Push successful!" && break
            echo "Retry $i failed, waiting..."
            sleep 5
          done
