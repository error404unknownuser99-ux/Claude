name: Android Emulator + RDP

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  android-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download F-Droid APK
        run: |
          curl -L https://f-droid.org/F-Droid.apk -o fdroid.apk
          echo "F-Droid Downloaded!"

      - name: Install XFCE + XRDP + bore
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xfce4 xfce4-terminal xfce4-goodies \
            xrdp dbus-x11 dbus-user-session x11-xserver-utils xorgxrdp \
            wget curl
          echo "Packages installed!"

      - name: Create User + Configure XRDP
        run: |
          sudo useradd -m -s /bin/bash cyberpunk 2>/dev/null || true
          echo "cyberpunk:Cyber@2025!" | sudo chpasswd
          sudo usermod -aG sudo cyberpunk

          sudo adduser xrdp ssl-cert 2>/dev/null || true

          # autorun=Xorg - black screen fix
          sudo sed -i 's/^autorun=$/autorun=Xorg/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          # startwm.sh - dbus fix
          sudo tee /etc/xrdp/startwm.sh > /dev/null << 'EOF'
          #!/bin/sh
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export XDG_CONFIG_DIRS=/etc/xdg:/etc
          export PATH=/usr/lib/x86_64-linux-gnu/xfce4/xfconf:$PATH
          exec dbus-run-session -- startxfce4
          EOF
          sudo chmod +x /etc/xrdp/startwm.sh

          sudo systemctl restart xrdp
          sleep 3
          echo "XRDP Ready!"

      - name: Start bore tunnel + Save Port
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          # Bore tunnel start karo background mein
          ./bore local 3389 --to bore.pub > output/bore_out.txt 2>&1 &
          sleep 8

          PORT=$(grep -oP 'listening at bore\.pub:\K\d+' output/bore_out.txt 2>/dev/null)
          echo "PORT: $PORT"

          cat > output/rdp_credentials.txt << CREDS
          USERNAME: cyberpunk
          PASSWORD: Cyber@2025!
          ADDRESS:  bore.pub:$PORT
          CREDS

          git add output/
          git diff --staged --quiet || (git commit -m "Android RDP LIVE bore.pub:$PORT" && \
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              sleep 2
            done)

          echo "Tunnel LIVE at bore.pub:$PORT"

      - name: Android Emulator - RDP Display Pe
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: :10.0
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          ram-size: 4096M
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Emulator chal raha hai!"
            adb install fdroid.apk || true
            echo "F-Droid Installed!"
            adb shell monkey -p org.fdroid.fdroid 1 || true
            echo "Session alive - RDP se connect karo!"
            sleep 18000
