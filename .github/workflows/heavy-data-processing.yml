name: Windows RDP via bore.pub

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Enable RDP and Create User
        shell: pwsh
        run: |
          $pass = "BoreRDP@2025!"
          net user liveuser $pass /add
          net localgroup administrators liveuser /add
          net localgroup "Remote Desktop Users" liveuser /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Write-Host "RDP Enabled! User: liveuser | Pass: BoreRDP@2025!"

      - name: Download bore and Start Tunnel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          Write-Host "Downloading bore..."
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip -UseBasicParsing
          Expand-Archive bore.zip -DestinationPath . -Force
          Write-Host "Starting bore tunnel on port 3389..."
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardError "output\bore_err.txt" -RedirectStandardOutput "output\bore_out.txt" -NoNewWindow -PassThru | Out-Null
          Start-Sleep -Seconds 12
          $err = Get-Content "output\bore_err.txt" -Raw -ErrorAction SilentlyContinue
          $out = Get-Content "output\bore_out.txt" -Raw -ErrorAction SilentlyContinue
          Write-Host "BORE STDERR: $err"
          Write-Host "BORE STDOUT: $out"
          "USERNAME: liveuser" | Out-File output\rdp_credentials.txt -Encoding UTF8
          "PASSWORD: BoreRDP@2025!" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
          "BORE STDERR: $err" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
          "BORE STDOUT: $out" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
          "HOW TO CONNECT: mstsc or Microsoft RDP app -> bore.pub:PORT" | Out-File output\rdp_credentials.txt -Append -Encoding UTF8
          Get-Content output\rdp_credentials.txt

      - name: Commit Credentials
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "RDP credentials ready"
            for ($i = 0; $i -lt 5; $i++) {
              git pull --rebase origin main
              git push
              if ($LASTEXITCODE -eq 0) { break }
              Start-Sleep -Seconds 3
            }
          }

      - name: Keep Session Alive
        shell: pwsh
        run: |
          Write-Host "Session alive - connect karo RDP se!"
          Write-Host "User: liveuser | Pass: BoreRDP@2025!"
          Start-Sleep -Seconds 19800
