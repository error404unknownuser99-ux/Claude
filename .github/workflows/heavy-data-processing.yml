name: 🖥️ Ubuntu Desktop - RustDesk

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🗂️ Setup folders
        run: mkdir -p output scripts

      - name: 📦 Install Desktop + Xvfb
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 🚀 Setup shuru..." | tee -a "$LOG"
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xvfb dbus-x11 \
            xserver-xorg-video-dummy x11-xserver-utils \
            --no-install-recommends -qq
          echo "[$(date -u '+%H:%M:%S')] ✅ Desktop installed!" | tee -a "$LOG"

      - name: 🖥️ Start Virtual Display + XFCE
        run: |
          LOG="output/runtimelogs.txt"
          Xvfb :10 -screen 0 1920x1080x24 +extension RANDR +extension GLX &
          sleep 3
          DISPLAY=:10 dbus-launch --exit-with-session startxfce4 &
          sleep 5
          echo "[$(date -u '+%H:%M:%S')] ✅ Virtual display ready!" | tee -a "$LOG"

      - name: 📥 Install RustDesk
        run: |
          LOG="output/runtimelogs.txt"
          echo "[$(date -u '+%H:%M:%S')] 📥 RustDesk download..." | tee -a "$LOG"
          wget -q "https://github.com/rustdesk/rustdesk/releases/download/1.3.8/rustdesk-1.3.8-x86_64.deb" -O /tmp/rustdesk.deb
          sudo dpkg -i /tmp/rustdesk.deb || sudo apt-get install -f -y -qq
          echo "[$(date -u '+%H:%M:%S')] ✅ RustDesk installed!" | tee -a "$LOG"

      - name: 🔑 Set Password + Start RustDesk
        run: |
          LOG="output/runtimelogs.txt"
          FIXED_PASS="Pass1234"

          mkdir -p /root/.config/rustdesk
          mkdir -p /home/runner/.config/rustdesk

          echo "permanent-password = \"$FIXED_PASS\"" > /root/.config/rustdesk/RustDesk2.toml
          echo "permanent-password = \"$FIXED_PASS\"" > /home/runner/.config/rustdesk/RustDesk2.toml

          echo "[$(date -u '+%H:%M:%S')] 🔑 Config likha: $(cat /root/.config/rustdesk/RustDesk2.toml)" | tee -a "$LOG"

          export DISPLAY=:10
          sudo rustdesk --service &
          sleep 5
          DISPLAY=:10 rustdesk &
          sleep 12

          RUSTDESK_ID=$(rustdesk --get-id 2>/dev/null | tr -d '[:space:]')
          echo "[$(date -u '+%H:%M:%S')] 🎉 RUSTDESK READY!" | tee -a "$LOG"
          echo "[$(date -u '+%H:%M:%S')] 🔢 ID:       $RUSTDESK_ID" | tee -a "$LOG"
          echo "[$(date -u '+%H:%M:%S')] 🔑 Password: $FIXED_PASS" | tee -a "$LOG"

      - name: 💾 Push Info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🖥️ RustDesk live"
          git pull --rebase origin main
          git push

      - name: ⏳ Keep Alive
        run: |
          LOG="output/runtimelogs.txt"
          RUSTDESK_ID=$(rustdesk --get-id 2>/dev/null | tr -d '[:space:]')
          echo "[$(date -u '+%H:%M:%S')] ⏳ Alive! ID:$RUSTDESK_ID Pass:Pass1234" | tee -a "$LOG"
          COUNT=0
          while true; do
            sleep 300
            COUNT=$((COUNT + 5))
            RD_ALIVE=$(pgrep -x rustdesk > /dev/null && echo "alive" || echo "dead")
            echo "[$(date -u '+%H:%M:%S')] [${COUNT}min] RustDesk:$RD_ALIVE ID:$RUSTDESK_ID" | tee -a "$LOG"
            if [ "$RD_ALIVE" = "dead" ]; then
              export DISPLAY=:10
              DISPLAY=:10 rustdesk &
              sleep 5
            fi
            if [ "$COUNT" -ge 330 ]; then
              echo "[$(date -u '+%H:%M:%S')] ⏰ 5.5hr done!" | tee -a "$LOG"
              break
            fi
          done
