name: GitChat - Live Chat Server 💬

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/chat_server.py'
  workflow_dispatch:

jobs:
  gitchat-server:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - uses: actions/checkout@v4

      - name: Setup output folder
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🚀 GitChat setup shuru..." >> output/runtimelogs.txt
          cat output/runtimelogs.txt

      - name: Install bore tunnel
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 📦 bore install ho raha hai..." >> output/runtimelogs.txt
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz -o bore.tar.gz
          tar xzf bore.tar.gz
          sudo mv bore /usr/local/bin/bore
          bore --version
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ✅ bore install ho gaya!" >> output/runtimelogs.txt

      - name: Start GitChat Python server
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🐍 Python chat server start ho raha hai port 8080 pe..." >> output/runtimelogs.txt
          python3 scripts/chat_server.py &
          echo $! > /tmp/server.pid
          sleep 3
          if curl -s http://localhost:8080 > /dev/null; then
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ✅ Chat server chal raha hai port 8080 pe!" >> output/runtimelogs.txt
          else
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ❌ Server start nahi hua!" >> output/runtimelogs.txt
            exit 1
          fi

      - name: Open bore tunnel & broadcast URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🌐 bore tunnel khol raha hai..." >> output/runtimelogs.txt

          bore local 8080 --to bore.pub 2>&1 | tee /tmp/bore.log &
          BORE_PID=$!
          sleep 10

          BORE_ADDR=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1)

          if [ -n "$BORE_ADDR" ]; then
            CHAT_URL="http://${BORE_ADDR}"
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🎉 CHAT APP LIVE HAI!" >> output/runtimelogs.txt
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🔗 URL: ${CHAT_URL}" >> output/runtimelogs.txt
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 👇 Is URL pe jao, naam dalo, join ho jao!" >> output/runtimelogs.txt

            echo "${CHAT_URL}" > output/chat_url.txt

            git config user.name "error404unknownuser99-ux"
            git config user.email "error404unknownuser99@users.noreply.github.com"
            git add output/
            git diff --staged --quiet || git commit -m "💬 GitChat LIVE: ${CHAT_URL}"
            git pull --rebase origin main
            git push

            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ✅ URL repo mein push ho gaya! output/chat_url.txt dekho" >> output/runtimelogs.txt
          else
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ❌ bore URL nahi mila!" >> output/runtimelogs.txt
            cat /tmp/bore.log >> output/runtimelogs.txt
            exit 1
          fi

          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ⏳ Server live hai! Cancel karo tab band hoga." >> output/runtimelogs.txt

          while kill -0 $BORE_PID 2>/dev/null; do
            sleep 300
            USERS_COUNT=$(curl -s http://localhost:8080/api/users 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "?")
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💓 Heartbeat — Online users: ${USERS_COUNT} | URL: ${CHAT_URL}" >> output/runtimelogs.txt
            git add output/runtimelogs.txt
            git diff --staged --quiet || git commit -m "💓 GitChat heartbeat"
            git pull --rebase origin main
            git push
          done
