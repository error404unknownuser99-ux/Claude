name: Ubuntu XFCE Cyberpunk RDP

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: System Optimize - MAX PERFORMANCE
        run: |
          sudo swapoff -a
          echo 0 | sudo tee /proc/sys/vm/swappiness
          sudo sysctl -w vm.vfs_cache_pressure=50
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            echo performance | sudo tee $cpu 2>/dev/null || true
          done
          echo "RAM before:"
          free -h
          sudo systemctl stop snapd 2>/dev/null || true
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl stop apt-daily.timer 2>/dev/null || true
          sudo systemctl stop apt-daily-upgrade.timer 2>/dev/null || true
          echo "Optimization done!"

      - name: Install XFCE + XRDP + Cyberpunk Theme
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xfce4 xfce4-terminal xfce4-goodies \
            xrdp dbus-x11 x11-xserver-utils \
            fonts-noto fonts-firacode \
            papirus-icon-theme \
            arc-theme \
            wget curl git unzip \
            firefox \
            xfce4-taskmanager \
            thunar-archive-plugin \
            neofetch
          echo "All packages installed!"

      - name: Configure XFCE Cyberpunk Theme + Kill ALL Animations
        run: |
          sudo useradd -m -s /bin/bash cyberpunk 2>/dev/null || true
          echo "cyberpunk:Cyber@2025!" | sudo chpasswd
          sudo usermod -aG sudo cyberpunk

          sudo -u cyberpunk bash << 'USEREOF'
          mkdir -p /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml

          cat > /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Arc-Dark"/>
              <property name="use_compositing" type="bool" value="false"/>
              <property name="frame_opacity" type="int" value="100"/>
              <property name="show_frame_shadow" type="bool" value="false"/>
              <property name="animate_mouse" type="bool" value="false"/>
              <property name="box_move" type="bool" value="false"/>
              <property name="box_resize" type="bool" value="false"/>
              <property name="snap_windows" type="bool" value="true"/>
              <property name="wrap_windows" type="bool" value="false"/>
            </property>
          </channel>
          EOF

          cat > /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Arc-Dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
              <property name="MonospaceFontName" type="string" value="FiraCode 10"/>
              <property name="EnableAnimations" type="bool" value="false"/>
              <property name="CursorThemeName" type="string" value="Adwaita"/>
            </property>
          </channel>
          EOF

          cat > /home/cyberpunk/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="backdrop" type="empty">
              <property name="screen0" type="empty">
                <property name="monitorVNC-0" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="color-style" type="int" value="0"/>
                    <property name="rgba1" type="array">
                      <value type="double" value="0.02"/>
                      <value type="double" value="0.008"/>
                      <value type="double" value="0.09"/>
                      <value type="double" value="1"/>
                    </property>
                    <property name="rgba2" type="array">
                      <value type="double" value="0"/>
                      <value type="double" value="0.8"/>
                      <value type="double" value="1"/>
                      <value type="double" value="1"/>
                    </property>
                    <property name="image-style" type="int" value="0"/>
                  </property>
                </property>
              </property>
            </property>
          </channel>
          EOF

          cat > /home/cyberpunk/.config/gtk-3.0/settings.ini << 'EOF'
          [Settings]
          gtk-theme-name=Arc-Dark
          gtk-icon-theme-name=Papirus-Dark
          gtk-font-name=Noto Sans 10
          gtk-enable-animations=0
          gtk-primary-button-warps-slider=false
          EOF
          mkdir -p /home/cyberpunk/.config/gtk-3.0

          cat > /home/cyberpunk/.gtkrc-2.0 << 'EOF'
          gtk-theme-name="Arc-Dark"
          gtk-icon-theme-name="Papirus-Dark"
          gtk-font-name="Noto Sans 10"
          gtk-enable-animations=0
          EOF
          USEREOF
          echo "XFCE Cyberpunk theme configured!"

      - name: Configure XRDP
        run: |
          sudo adduser xrdp ssl-cert 2>/dev/null || true
          echo "xfce4-session" | sudo tee /home/cyberpunk/.xsession
          sudo chown cyberpunk:cyberpunk /home/cyberpunk/.xsession

          sudo sed -i 's/max_bpp=32/max_bpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true
          sudo sed -i 's/xserverbpp=24/xserverbpp=24/' /etc/xrdp/xrdp.ini 2>/dev/null || true

          sudo bash -c 'cat >> /etc/xrdp/xrdp.ini << EOF

          [Globals]
          tcp_send_buffer_bytes=4194304
          tcp_recv_buffer_bytes=4194304
          EOF'

          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          sleep 3
          sudo systemctl status xrdp --no-pager
          echo "XRDP configured!"

      - name: Download bore and Start Tunnel with Auto-Reconnect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          echo "bore downloaded!"

          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "=== Tunnel attempt #$attempt ==="

            ./bore local 3389 --to bore.pub > output/bore_out.txt 2>&1 &
            BORE_PID=$!
            sleep 8

            PORT=$(grep -oP 'listening at bore\.pub:\K\d+' output/bore_out.txt 2>/dev/null)

            if [ -n "$PORT" ]; then
              echo "TUNNEL LIVE! bore.pub:$PORT"

              cat > output/rdp_credentials.txt << CREDS
          USERNAME: cyberpunk
          PASSWORD: Cyber@2025!
          ADDRESS:  bore.pub:$PORT
          ATTEMPT:  $attempt
          CONNECT:  Microsoft RDP App -> bore.pub:$PORT
          CREDS

              git add output/
              git diff --staged --quiet || (git commit -m "Ubuntu RDP LIVE bore.pub:$PORT" && \
                for i in 1 2 3 4 5; do
                  git pull --rebase origin main && git push && break
                  sleep 2
                done)

              wait $BORE_PID
              echo "Bore exited! Reconnecting in 5s..."
              sleep 5
            else
              echo "Port not found, retrying..."
              kill $BORE_PID 2>/dev/null || true
              sleep 5
            fi
          done
