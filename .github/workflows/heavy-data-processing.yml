name: 🪟 Windows Desktop - RDP + bore.pub

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-2019
    timeout-minutes: 355

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Optimize Windows - Performance Mode
        shell: powershell
        run: |
          # ── Visual Effects → Best Performance (animations/shadows off) ──
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects"
          if (!(Test-Path $path)) { New-Item -Path $path -Force | Out-Null }
          Set-ItemProperty -Path $path -Name VisualFXSetting -Value 2

          # All visual effects off
          $advPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $advPath -Name TaskbarAnimations -Value 0
          Set-ItemProperty -Path $advPath -Name ListviewShadow -Value 0
          Set-ItemProperty -Path $advPath -Name ListviewAlphaSelect -Value 0

          # ── 16-bit Color (reduces GPU/CPU load) ──
          $dispPath = "HKLM:\SYSTEM\CurrentControlSet\Control\GraphicsDrivers\Configuration"
          Get-ChildItem $dispPath -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            if ((Get-ItemProperty $_.PSPath -ErrorAction SilentlyContinue).BitsPerPel) {
              Set-ItemProperty -Path $_.PSPath -Name BitsPerPel -Value 16 -ErrorAction SilentlyContinue
            }
          }

          # ── Disable Unnecessary Services ──
          $services = @("SysMain","WSearch","DiagTrack","TabletInputService","Themes","wuauserv","BITS")
          foreach ($svc in $services) {
            Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # ── Power Plan → High Performance ──
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c 2>$null

          # ── Free RAM - Stop background apps ──
          Get-Process | Where-Object {
            $_.Name -notmatch "svchost|System|lsass|csrss|winlogon|services|wininit|smss|dwm|explorer|conhost|powershell|pwsh|cmd"
          } | Stop-Process -Force -ErrorAction SilentlyContinue

          Write-Host "✅ Windows optimized!"

      - name: 🖥️ Setup RDP - Enable + Configure
        shell: powershell
        run: |
          # Enable RDP
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

          # Network Level Auth off (easy connect)
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0

          # RDP color depth = 16-bit
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "ColorDepth" -Value 2

          # Max connections
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "MaxInstanceCount" -Value 10

          # Set password for runneradmin
          net user runneradmin "RDP@Pass123" 2>$null
          if ($LASTEXITCODE -ne 0) {
            $pass = ConvertTo-SecureString "RDP@Pass123" -AsPlainText -Force
            New-LocalUser -Name "rdpuser" -Password $pass -FullName "RDP User" -PasswordNeverExpires -ErrorAction SilentlyContinue
            Add-LocalGroupMember -Group "Administrators" -Member "rdpuser" -ErrorAction SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdpuser" -ErrorAction SilentlyContinue
            Write-Host "✅ New user rdpuser created!"
          } else {
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
            Write-Host "✅ runneradmin password set!"
          }

          # Restart RDP service
          Restart-Service TermService -Force -ErrorAction SilentlyContinue
          Write-Host "✅ RDP configured!"

      - name: 🌐 Install bore + Start Tunnel
        shell: powershell
        run: |
          mkdir -p output | Out-Null
          $LOG = "output\runtimelogs.txt"

          "[$(Get-Date -Format 'HH:mm:ss')] 📥 bore download ho raha hai..." | Tee-Object -FilePath $LOG -Append

          # bore Windows binary download
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.exe"
          Invoke-WebRequest -Uri $boreUrl -OutFile "C:\bore.exe" -UseBasicParsing

          "[$(Get-Date -Format 'HH:mm:ss')] 🌐 Tunnel start ho raha hai port 3389..." | Tee-Object -FilePath $LOG -Append

          # bore background mein start
          $proc = Start-Process -FilePath "C:\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "C:\bore_out.txt" -RedirectStandardError "C:\bore_err.txt" -PassThru -WindowStyle Hidden
          $proc.Id | Out-File "C:\bore_pid.txt"

          Start-Sleep -Seconds 12

          # Port nikalo output se
          $boreOut = Get-Content "C:\bore_out.txt" -ErrorAction SilentlyContinue
          $boreErr = Get-Content "C:\bore_err.txt" -ErrorAction SilentlyContinue
          $allOut = "$boreOut $boreErr"
          $match = [regex]::Match($allOut, "bore\.pub:(\d+)")

          if ($match.Success) {
            $port = $match.Groups[1].Value
            $host = "bore.pub:$port"

            "" | Tee-Object -FilePath $LOG -Append
            "[$(Get-Date -Format 'HH:mm:ss')] 🎉🎉 TUNNEL READY! 🎉🎉" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
            "   🪟  RDP CONNECTION INFO (Windows 2019)" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
            "   🌐 Host:     $host" | Tee-Object -FilePath $LOG -Append
            "   👤 Username: runneradmin (ya rdpuser)" | Tee-Object -FilePath $LOG -Append
            "   🔑 Password: RDP@Pass123" | Tee-Object -FilePath $LOG -Append
            "   🎨 Color:    16-bit (optimized!)" | Tee-Object -FilePath $LOG -Append
            "================================================" | Tee-Object -FilePath $LOG -Append
          } else {
            "[$(Get-Date -Format 'HH:mm:ss')] ⚠️ Port nahi mila! Output: $allOut" | Tee-Object -FilePath $LOG -Append
          }

      - name: 💾 Push Connection Info
        shell: powershell
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet; if ($LASTEXITCODE -ne 0) { git commit -m "🪟 Windows RDP live!" }
          $env:GIT_ASKPASS = ''
          git pull --rebase origin main
          git push origin main

      - name: ⏳ Keep Alive (5.5 hours)
        shell: powershell
        run: |
          $LOG = "output\runtimelogs.txt"
          $boreOut = Get-Content "C:\bore_out.txt" -ErrorAction SilentlyContinue
          $boreErr = Get-Content "C:\bore_err.txt" -ErrorAction SilentlyContinue
          $match = [regex]::Match("$boreOut $boreErr", "bore\.pub:(\d+)")
          $host = if ($match.Success) { "bore.pub:$($match.Groups[1].Value)" } else { "unknown" }

          "[$(Get-Date -Format 'HH:mm:ss')] ⏳ Session alive! Host: $host" | Tee-Object -FilePath $LOG -Append

          $count = 0
          while ($true) {
            Start-Sleep -Seconds 300
            $count += 5

            $rdpSvc = (Get-Service TermService -ErrorAction SilentlyContinue).Status
            $borePid = Get-Content "C:\bore_pid.txt" -ErrorAction SilentlyContinue
            $boreAlive = if (Get-Process -Id $borePid -ErrorAction SilentlyContinue) { "alive" } else { "dead" }

            "[$(Get-Date -Format 'HH:mm:ss')] [${count}min] RDP:$rdpSvc bore:$boreAlive Host:$host" | Tee-Object -FilePath $LOG -Append

            if ($boreAlive -eq "dead") {
              "[$(Get-Date -Format 'HH:mm:ss')] 🔄 bore restart..." | Tee-Object -FilePath $LOG -Append
              $proc = Start-Process -FilePath "C:\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "C:\bore_out.txt" -RedirectStandardError "C:\bore_err.txt" -PassThru -WindowStyle Hidden
              $proc.Id | Out-File "C:\bore_pid.txt"
              Start-Sleep -Seconds 10
            }

            if ($count -ge 330) {
              "[$(Get-Date -Format 'HH:mm:ss')] ⏰ 5.5hr done!" | Tee-Object -FilePath $LOG -Append
              break
            }
          }
