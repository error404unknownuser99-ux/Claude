name: AI Image Generator - Live Server

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Runner Specs
        run: |
          mkdir -p output
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🔍 GitHub Actions Runner Specs" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ================================================" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🖥️  CPU Model   : $(cat /proc/cpuinfo | grep 'model name' | head -1 | cut -d: -f2 | xargs)" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🖥️  CPU Cores   : $(nproc)" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💾 Total RAM   : $(free -h | grep Mem | awk '{print $2}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💾 Free RAM    : $(free -h | grep Mem | awk '{print $4}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💾 Used RAM    : $(free -h | grep Mem | awk '{print $3}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💿 Total Disk  : $(df -h / | tail -1 | awk '{print $2}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💿 Free Disk   : $(df -h / | tail -1 | awk '{print $4}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 💿 Used Disk   : $(df -h / | tail -1 | awk '{print $3}')" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🐧 OS          : $(lsb_release -d | cut -d: -f2 | xargs)" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🐧 Kernel      : $(uname -r)" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] 🌐 Public IP   : $(curl -s ifconfig.me)" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ================================================" >> output/runtimelogs.txt
          echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] ✅ Done!" >> output/runtimelogs.txt
          cat output/runtimelogs.txt

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🔍 Runner specs output"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 3
          done
