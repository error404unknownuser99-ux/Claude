name: 🔬 Heavy Data Processing

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/heavy-data-processing.yml'
      - 'scripts/process_data.py'
  workflow_dispatch:

jobs:
  data-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bore tunnel
        run: |
          echo "📦 Installing bore..."
          curl -fsSL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/bore.tar.gz
          tar -xzf /tmp/bore.tar.gz -C /tmp/
          sudo mv /tmp/bore /usr/local/bin/bore
          bore --version

      - name: Start web server
        run: |
          mkdir -p output
          echo "🚀 Starting Python web server on port 3000..."
          nohup python scripts/process_data.py > output/server.log 2>&1 &
          echo $! > /tmp/server.pid
          sleep 2
          echo "✅ Server PID: $(cat /tmp/server.pid)"
          curl -s http://localhost:3000/api/ping | python3 -m json.tool

      - name: Start bore tunnel & save URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🌐 Starting bore tunnel..."
          nohup bore local 3000 --to bore.pub > /tmp/bore.log 2>&1 &
          echo $! > /tmp/bore.pid
          sleep 5

          # Get bore URL
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' /tmp/bore.log | head -1)
          echo "Bore log:"
          cat /tmp/bore.log

          if [ -z "$BORE_URL" ]; then
            echo "❌ bore URL nahi mila! Retrying..."
            sleep 5
            BORE_URL=$(grep -o 'bore.pub:[0-9]*' /tmp/bore.log | head -1)
          fi

          FULL_URL="http://$BORE_URL"
          echo "✅ LIVE URL: $FULL_URL"
          echo "$FULL_URL" > output/live_url.txt
          echo "Started at: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> output/live_url.txt
          echo "Expires in ~30 minutes" >> output/live_url.txt

          # Commit URL immediately
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🌐 Live at $FULL_URL"
          git pull --rebase origin main
          git push
          echo "URL committed to repo! 🎉"

      - name: Keep alive (30 min)
        run: |
          echo "⏳ Server live rakhne ke liye wait kar raha hoon..."
          URL=$(cat output/live_url.txt | head -1)
          echo "🌐 Visit karo: $URL"
          
          for i in $(seq 1 30); do
            sleep 60
            echo "⏱️ $i min done | Server alive check..."
            curl -s http://localhost:3000/api/stats | python3 -m json.tool || echo "❌ Server down!"
          done
          echo "✅ 30 min complete! Server shutting down."

      - name: Commit output to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "error404unknownuser99-ux"
          git config user.email "error404unknownuser99@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Final output [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push

      - name: Hit Monitor /full
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://track-workflow.onrender.com/full)
          echo "✅ Monitor hit: $STATUS"
